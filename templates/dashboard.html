{% extends "base.html" %}

{% block content %}
<section class="card">
    <div class="card-heading">
        <h2>Analytics Dashboard</h2>
        <p>Monitor your links, click growth, and active versus expired status in real time.</p>
    </div>

    <div id="analytics" class="analytics-grid"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Original URL</th>
                    <th>Short URL</th>
                    <th>Clicks</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="url-table-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
