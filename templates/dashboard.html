{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Dashboard</h2>
    <p>Track your links, click performance, and expiry status.</p>

    <div id="analytics" class="analytics-grid"></div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Original URL</th>
                    <th>Short URL</th>
                    <th>Clicks</th>
                    <th>Expiry</th>
                    <th>Created</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="url-table-body"></tbody>
        </table>
    </div>
</section>
{% endblock %}
