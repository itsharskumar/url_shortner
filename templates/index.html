{% extends "base.html" %}

{% block content %}
<section class="card">
    <h2>Create Short URL</h2>
    <p>Paste a long URL and get a compact shareable link.</p>

    <form id="shorten-form" class="form-grid">
        <input
            id="original-url"
            type="url"
            placeholder="https://example.com/really/long/link"
            required
        />
        <button type="submit">Shorten URL</button>
    </form>

    <div id="result" class="result hidden"></div>
</section>
{% endblock %}
