{% extends "base.html" %}

{% block content %}
<section class="card card-hero">
    <div class="card-heading">
        <h2>Shorten Links With Control</h2>
        <p>Create branded short links, set expiry, and track performance from one clean dashboard.</p>
    </div>

    <form id="shorten-form" class="form-grid">
        <input
            id="original-url"
            type="url"
            placeholder="https://example.com/really/long/link"
            required
        />
        <input
            id="custom-code"
            type="text"
            placeholder="custom-code (optional)"
        />
        <input
            id="expires-at"
            type="datetime-local"
            placeholder="Expiry (optional)"
        />
        <button type="submit">Generate Link</button>
    </form>

    <p class="helper-text">Tip: Use custom code to create memorable links like marketing-offer or docs-quickstart.</p>
    <div id="result" class="result hidden"></div>
</section>
{% endblock %}
