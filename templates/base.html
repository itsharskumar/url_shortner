<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "URL Shortener" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <header class="site-header">
        <a href="/" class="brand">
            <span class="brand-dot"></span>
            <span>LinkVault</span>
        </a>
        <nav class="site-nav">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/auth">Login/Register</a>
            <a href="/docs" target="_blank" rel="noreferrer">Swagger</a>
            <button id="logout-btn" class="ghost-btn hidden" type="button">Logout</button>
        </nav>
    </header>

    <main class="container page-enter">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
